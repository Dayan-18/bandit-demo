name: Bandit SAST Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Scan vulnerable app (findings expected, does not block)
        run: bandit app.py || true

      - name: Scan fixed app (security gate)
        run: bandit app_fixed.py

      - name: Upload JSON report (always)
        if: always()
        run: bandit -r . -f json -o bandit-report.json --exclude ./.github || true

      - name: Archive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
